<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <link rel="alternate" type="application/rss+xml" href="{{ "index.xml" | relURL }}" title="{{ .Site.Title }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
    <p class="site-tagline">{{ .Site.Params.description }}</p>
    <nav class="site-nav">
      <a href="{{ "/" | relURL }}">Home</a>
      <a href="{{ "/about/" | relURL }}">About Me</a>
      <a href="{{ "/contact/" | relURL }}">Contact</a>
    </nav>
  </header>
  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>&copy; {{ now.Year }} {{ .Site.Title }}. Posts generated daily with Claude.</p>
  </footer>
</body>
</html>
