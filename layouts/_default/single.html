{{ define "main" }}
<article class="post">
  <h1>{{ .Title }}</h1>
  <p class="post-meta">{{ .Date.Format "January 2, 2006" }}
    {{ if .Params.tags }} · {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}{{ end }}
  </p>
  <div class="post-body">
    {{ .Content }}
  </div>
  <p><a href="{{ "/posts/" | relURL }}">&larr; Back to all posts</a></p>
</article>
{{ end }}
