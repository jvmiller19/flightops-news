name: Check Feedback and Finalize Post

on:
  schedule:
    # Every 30 minutes. Cheap no-op when there's nothing pending (generate_post.py
    # exits quickly if .pending/ is empty), so a tight interval is fine.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: check-feedback
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check for reply and finalize/publish if found
        id: finalize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/generate_post.py finalize

      - name: Commit changes (new post and/or removed pending drafts)
        id: commit
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add content/posts/ .pending/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto: finalize post / clear pending drafts $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site deploy
        if: steps.finalize.outputs.published == 'true' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml
