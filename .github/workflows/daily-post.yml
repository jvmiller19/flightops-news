name: Generate Daily Post (Research Phase)

on:
  schedule:
    # 13:07 UTC, Monday-Friday only (~9am US Eastern). Offset from the top
    # of the hour since GitHub recommends avoiding :00 to reduce queuing
    # delay from the load spike when many repos' crons fire simultaneously.
    - cron: "7 13 * * 1-5"
    # Backup run at 15:37 UTC in case the 13:07 trigger doesn't fire
    # (GitHub's scheduled cron is best-effort and occasionally skips runs
    # under load). generate_post.py skips if a draft/post for today already
    # exists, so this is safe to run even if the first run succeeded.
    - cron: "37 15 * * 1-5"
  workflow_dispatch: {}
  # External backstop: an outside cron service (cron-job.org) calls GitHub's
  # repository_dispatch API daily, bypassing GitHub's own scheduler entirely
  # in case both cron triggers above fail to fire.
  repository_dispatch:
    types: [daily-post-trigger]

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Research topic, draft post, email Vincent the questions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/generate_post.py research

      - name: Commit pending draft
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          mkdir -p .pending
          git add .pending/
          if git diff --cached --quiet; then
            echo "No new pending draft to commit."
          else
            git commit -m "Auto: pending draft $(date -u +%Y-%m-%d)"
            git push
          fi
