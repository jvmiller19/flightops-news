name: Generate Daily Post

on:
  schedule:
    # 13:00 UTC, Monday-Friday only (~9am US Eastern). Adjust to taste.
    - cron: "0 13 * * 1-5"
    # Backup run at 15:30 UTC in case the 13:00 trigger doesn't fire
    # (GitHub's scheduled cron is best-effort and occasionally skips runs
    # under load). generate_post.py skips generation if today's post
    # already exists, so this is safe to run even if the first run succeeded.
    - cron: "30 15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit and push new post
        id: commit
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add content/posts/
          if git diff --cached --quiet; then
            echo "No new post to commit."
            echo "new_post=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto: daily post $(date -u +%Y-%m-%d)"
            git push
            echo "new_post=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site deploy
        if: steps.commit.outputs.new_post == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml

      - name: Email notification
        if: steps.commit.outputs.new_post == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Flight Ops Tech Digest <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "New post published: ${{ steps.generate.outputs.post_title }}"
          body: |
            A new post just went live on Flight Ops Tech Digest.

            Title: ${{ steps.generate.outputs.post_title }}
            Summary: ${{ steps.generate.outputs.post_summary }}

            It will be live on the site within a few minutes, once the deploy workflow finishes.
